<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#050506">
<title>Sales Intelligence</title>
<script src="/api/config"></script>
<script src="topbar.js" defer></script>

<style>
:root {
  --text-primary:   #FAFAFA;
  --text-secondary: #B8B6B0;
  --text-tertiary:  #76746E;
  --success:  #6BE3A4;
  --warning:  #F2C063;
  --danger:   #FF6B6B;
  --anish:    #6BE3A4;   /* green  */
  --michelle: #7DD3FC;   /* sky blue */
  --font:      -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  --font-mono: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
}

* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; background: #050506; color: var(--text-secondary); font-family: var(--font); -webkit-font-smoothing: antialiased; }
body {
  min-height: 100vh; position: relative; overflow-x: hidden;
  padding: max(28px, env(safe-area-inset-top)) 20px 60px;
}
body::before {
  content: ''; position: fixed; inset: 0;
  background:
    radial-gradient(circle at 82% 14%, rgba(224,118,88,0.16), transparent 45%),
    radial-gradient(circle at 18% 90%, rgba(180,180,200,0.06), transparent 50%);
  filter: blur(40px); pointer-events: none; z-index: -2;
  animation: drift 36s ease-in-out infinite alternate;
}
body::after {
  content: ''; position: fixed; inset: 0;
  background-image: radial-gradient(rgba(255,255,255,0.014) 1px, transparent 1px);
  background-size: 3px 3px; pointer-events: none; z-index: -1;
}
@keyframes drift { 0%{transform:translate3d(0,0,0)} 100%{transform:translate3d(-22px,14px,0)} }

.page { max-width: 1100px; margin: 0 auto; }

/* ── Page header ── */
.page-head {
  display: flex; align-items: center; justify-content: space-between;
  gap: 12px; margin-bottom: 20px; flex-wrap: wrap;
}
.dash-title {
  margin: 0; font-size: 28px; font-weight: 700; letter-spacing: -0.025em;
  background: linear-gradient(180deg, #FFFFFF 0%, #C7C4BC 120%);
  -webkit-background-clip: text; background-clip: text;
  -webkit-text-fill-color: transparent; color: transparent;
}
@media (max-width: 480px) { .dash-title { font-size: 22px; } }

.head-right { display: flex; align-items: center; gap: 10px; }
.sync-info {
  font-family: var(--font-mono); font-size: 11px; color: var(--text-tertiary);
  letter-spacing: 0.04em;
}
.refresh-btn {
  border: 1px solid rgba(255,255,255,0.10); border-radius: 10px;
  background: rgba(255,255,255,0.04); color: var(--text-secondary);
  font-family: var(--font-mono); font-size: 11px; font-weight: 600;
  letter-spacing: 0.06em; padding: 7px 14px; cursor: pointer;
  transition: background 0.15s, color 0.15s;
}
.refresh-btn:hover { background: rgba(255,255,255,0.08); color: var(--text-primary); }
.refresh-btn:disabled { opacity: 0.4; cursor: default; }

/* ── Error banner ── */
.error-banner {
  display: none; align-items: flex-start; gap: 12px;
  background: rgba(255,107,107,0.08); border: 1px solid rgba(255,107,107,0.25);
  border-radius: 12px; padding: 14px 16px; margin-bottom: 18px;
}
.error-banner.show { display: flex; }
.error-banner p { margin: 0; font-size: 13px; line-height: 1.55; }
.error-banner p + p { margin-top: 6px; }
.error-banner code {
  font-family: var(--font-mono); font-size: 11px;
  background: rgba(255,255,255,0.06); border-radius: 4px; padding: 1px 5px;
}

/* ── Two-panel layout ── */
.panels {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
}
@media (max-width: 720px) { .panels { grid-template-columns: 1fr; } }

/* ── Glass card ── */
.card {
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 18px;
  padding: 22px;
  backdrop-filter: blur(24px) saturate(1.2);
  -webkit-backdrop-filter: blur(24px) saturate(1.2);
  box-shadow: 0 12px 40px rgba(0,0,0,0.45);
}

/* ── Section label ── */
.section-eyebrow {
  font-size: 10px; font-weight: 700; letter-spacing: 0.18em;
  text-transform: uppercase; color: var(--text-tertiary);
  display: flex; align-items: center; gap: 10px; margin-bottom: 18px;
}
.section-eyebrow::before { content: ''; width: 16px; height: 1px; background: var(--text-tertiary); opacity: 0.5; flex-shrink: 0; }
.section-eyebrow::after  { content: ''; flex: 1; height: 1px; background: linear-gradient(90deg, rgba(255,255,255,0.07), transparent); }

/* ──────────────────────────────────────────
   LEFT PANEL — Monthly
────────────────────────────────────────── */

/* Big appointments number */
.appt-block { margin-bottom: 20px; }
.appt-num {
  font-size: 52px; font-weight: 800; letter-spacing: -0.04em;
  font-variant-numeric: tabular-nums; color: var(--text-primary);
  line-height: 1; margin-bottom: 4px;
}
.appt-label { font-size: 11px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-tertiary); margin-bottom: 8px; }
.appt-by {
  display: flex; gap: 14px; font-size: 12px; font-family: var(--font-mono);
  color: var(--text-secondary);
}
.appt-by .by-a { color: var(--anish); }
.appt-by .by-m { color: var(--michelle); }
.appt-by .by-name { color: var(--text-tertiary); margin-right: 3px; }

/* MQL / SQL pair */
.funnel-pair {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 10px; margin-bottom: 20px;
}
.funnel-card {
  background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06);
  border-radius: 12px; padding: 14px;
}
.funnel-num {
  font-size: 30px; font-weight: 800; letter-spacing: -0.03em;
  font-variant-numeric: tabular-nums; color: var(--text-primary);
  line-height: 1; margin-bottom: 4px;
}
.funnel-label { font-size: 10px; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase; color: var(--text-tertiary); }

/* Conversion rate bars */
.conv-section .conv-row {
  display: flex; align-items: center; gap: 10px; margin-bottom: 10px;
}
.conv-row:last-child { margin-bottom: 0; }
.conv-name { font-size: 11px; font-family: var(--font-mono); color: var(--text-tertiary); width: 56px; flex-shrink: 0; letter-spacing: 0.04em; }
.conv-bar-wrap { flex: 1; }
.conv-bar {
  height: 5px; background: rgba(255,255,255,0.07); border-radius: 3px; overflow: hidden;
}
.conv-fill {
  height: 100%; border-radius: 3px;
  transition: width 0.7s cubic-bezier(0.22, 1, 0.36, 1);
}
.conv-fill-mql { background: linear-gradient(90deg, #6BE3A4, #34d399); }
.conv-fill-sql { background: linear-gradient(90deg, #7DD3FC, #38bdf8); }
.conv-pct {
  font-size: 12px; font-family: var(--font-mono); font-weight: 700;
  font-variant-numeric: tabular-nums; color: var(--text-primary);
  width: 36px; text-align: right; flex-shrink: 0;
}
.conv-sub {
  font-size: 10px; color: var(--text-tertiary); font-family: var(--font-mono);
  width: 36px; text-align: right; flex-shrink: 0; display: none;
}

/* ──────────────────────────────────────────
   RIGHT PANEL — Weekly / Daily
────────────────────────────────────────── */

/* Chart legend */
.chart-legend {
  display: flex; gap: 16px; margin-bottom: 12px;
  font-size: 11px; color: var(--text-secondary); align-items: center;
}
.leg-dot { display: inline-block; width: 8px; height: 8px; border-radius: 2px; margin-right: 5px; vertical-align: middle; flex-shrink: 0; }

/* Bar chart */
.bar-chart-wrap { margin-bottom: 22px; }
#barChart {
  display: flex; gap: 6px; align-items: flex-end;
  height: 130px; /* total height including day label */
}
.day-col {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: flex-end; gap: 5px;
}
.bar-pair {
  display: flex; gap: 3px; align-items: flex-end;
  height: 108px; /* bar-only area */
}
.bar-wrap {
  display: flex; flex-direction: column;
  align-items: center; justify-content: flex-end;
  height: 108px; min-width: 14px;
}
.bar-num {
  font-size: 9px; font-family: var(--font-mono); font-variant-numeric: tabular-nums;
  color: var(--text-tertiary); margin-bottom: 2px; line-height: 1;
}
.bar {
  width: 14px; min-height: 2px; border-radius: 3px 3px 0 0;
  transition: height 0.65s cubic-bezier(0.22, 1, 0.36, 1);
}
.bar-a { background: var(--anish);    box-shadow: 0 0 8px rgba(107,227,164,0.35); }
.bar-m { background: var(--michelle); box-shadow: 0 0 8px rgba(125,211,252,0.35); }
.day-lbl {
  font-size: 10px; font-family: var(--font-mono); letter-spacing: 0.06em;
  text-transform: uppercase; color: var(--text-tertiary); line-height: 1;
}

/* Meetings this week */
.meetings-row { margin-bottom: 18px; }
.meetings-head {
  display: flex; align-items: baseline; justify-content: space-between;
  margin-bottom: 8px;
}
.stat-label { font-size: 10px; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase; color: var(--text-tertiary); }
.meetings-count {
  font-size: 22px; font-weight: 800; letter-spacing: -0.02em;
  font-variant-numeric: tabular-nums; color: var(--text-primary);
}
.goal-of { font-size: 13px; color: var(--text-tertiary); font-weight: 500; margin-left: 2px; }
.prog-bar {
  height: 6px; background: rgba(255,255,255,0.07); border-radius: 4px; overflow: hidden;
  margin-bottom: 7px;
}
.prog-fill {
  height: 100%; border-radius: 4px;
  background: linear-gradient(90deg, #6BE3A4, #34d399);
  box-shadow: 0 0 8px rgba(107,227,164,0.4);
  transition: width 0.7s cubic-bezier(0.22, 1, 0.36, 1);
}
.meetings-by {
  display: flex; gap: 14px; font-size: 11px; font-family: var(--font-mono);
}
.meetings-by .by-a { color: var(--anish); }
.meetings-by .by-m { color: var(--michelle); }
.meetings-by .by-name { color: var(--text-tertiary); margin-right: 3px; }

/* Mini stat grid */
.mini-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.mini-card {
  background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06);
  border-radius: 12px; padding: 13px;
}
.mini-card-label { font-size: 10px; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase; color: var(--text-tertiary); margin-bottom: 10px; }
.mini-vals { display: flex; flex-direction: column; gap: 5px; }
.mini-val { display: flex; align-items: baseline; justify-content: space-between; }
.mini-who { font-size: 10px; font-family: var(--font-mono); color: var(--text-tertiary); }
.mini-num {
  font-size: 16px; font-weight: 800; font-variant-numeric: tabular-nums;
  letter-spacing: -0.02em; color: var(--text-primary);
}
.mini-val.row-a .mini-num { color: var(--anish); }
.mini-val.row-m .mini-num { color: var(--michelle); }

/* ── Loading skeleton ── */
.skel {
  background: rgba(255,255,255,0.06); border-radius: 6px;
  animation: skel-pulse 1.4s ease-in-out infinite;
  display: inline-block;
}
@keyframes skel-pulse {
  0%,100% { opacity: 0.5; }
  50%      { opacity: 1; }
}

/* ── Auto-refresh footer ── */
.page-foot {
  text-align: center; margin-top: 24px;
  font-size: 10px; font-family: var(--font-mono);
  color: var(--text-tertiary); letter-spacing: 0.06em;
}
</style>
</head>
<body>
<div class="page">

  <!-- Page header -->
  <div class="page-head">
    <h1 class="dash-title">Sales Intelligence</h1>
    <div class="head-right">
      <span class="sync-info" id="syncInfo">—</span>
      <button class="refresh-btn" id="refreshBtn" onclick="loadAll()">↻ Refresh</button>
    </div>
  </div>

  <!-- Error banner (shown when API not configured or returns error) -->
  <div class="error-banner" id="errBanner">
    <div>
      <p id="errMsg" style="color:var(--danger);font-weight:600"></p>
      <p id="errDetail" style="color:var(--text-secondary)"></p>
    </div>
  </div>

  <!-- Two panels -->
  <div class="panels">

    <!-- ── LEFT: Monthly ── -->
    <div class="card">
      <div class="section-eyebrow" id="monthLabel">Monthly</div>

      <!-- Big appointments counter -->
      <div class="appt-block">
        <div class="appt-num" id="mtdAppts">—</div>
        <div class="appt-label">Appointments set</div>
        <div class="appt-by">
          <span class="by-a"><span class="by-name">Anish</span><span id="mtdApptA">—</span></span>
          <span class="by-m"><span class="by-name">Michelle</span><span id="mtdApptM">—</span></span>
        </div>
      </div>

      <!-- MQL / SQL pair -->
      <div class="funnel-pair">
        <div class="funnel-card">
          <div class="funnel-num" id="mtdMQL">—</div>
          <div class="funnel-label">MQLs</div>
        </div>
        <div class="funnel-card">
          <div class="funnel-num" id="mtdSQL">—</div>
          <div class="funnel-label">SQLs</div>
        </div>
      </div>

      <!-- Conversion rates -->
      <div class="conv-section">
        <div class="conv-row">
          <span class="conv-name">MQL rate</span>
          <div class="conv-bar-wrap">
            <div class="conv-bar"><div class="conv-fill conv-fill-mql" id="mqlBar" style="width:0%"></div></div>
          </div>
          <span class="conv-pct" id="mqlRate">—</span>
        </div>
        <div class="conv-row">
          <span class="conv-name">SQL rate</span>
          <div class="conv-bar-wrap">
            <div class="conv-bar"><div class="conv-fill conv-fill-sql" id="sqlBar" style="width:0%"></div></div>
          </div>
          <span class="conv-pct" id="sqlRate">—</span>
        </div>
      </div>
    </div>

    <!-- ── RIGHT: Weekly / Daily ── -->
    <div class="card">
      <div class="section-eyebrow" id="weekLabel">This Week</div>

      <!-- Bar chart -->
      <div class="bar-chart-wrap">
        <div class="chart-legend">
          <span><span class="leg-dot" style="background:var(--anish)"></span>Anish</span>
          <span><span class="leg-dot" style="background:var(--michelle)"></span>Michelle</span>
        </div>
        <div id="barChart">
          <!-- rendered by JS -->
        </div>
      </div>

      <!-- Meetings progress -->
      <div class="meetings-row">
        <div class="meetings-head">
          <span class="stat-label">Meetings this week</span>
          <div class="meetings-count">
            <span id="wkMeetings">—</span><span class="goal-of">/10</span>
          </div>
        </div>
        <div class="prog-bar"><div class="prog-fill" id="meetingsBar" style="width:0%"></div></div>
        <div class="meetings-by">
          <span class="by-a"><span class="by-name">Anish</span><span id="wkMtgA">—</span></span>
          <span class="by-m"><span class="by-name">Michelle</span><span id="wkMtgM">—</span></span>
        </div>
      </div>

      <!-- Mini stats: avg dials + connects -->
      <div class="mini-grid">
        <div class="mini-card">
          <div class="mini-card-label">Avg dials / day</div>
          <div class="mini-vals">
            <div class="mini-val row-a">
              <span class="mini-who">Anish</span>
              <span class="mini-num" id="avgA">—</span>
            </div>
            <div class="mini-val row-m">
              <span class="mini-who">Michelle</span>
              <span class="mini-num" id="avgM">—</span>
            </div>
          </div>
        </div>
        <div class="mini-card">
          <div class="mini-card-label">Connects</div>
          <div class="mini-vals">
            <div class="mini-val row-a">
              <span class="mini-who">Anish</span>
              <span class="mini-num" id="connA">—</span>
            </div>
            <div class="mini-val row-m">
              <span class="mini-who">Michelle</span>
              <span class="mini-num" id="connM">—</span>
            </div>
          </div>
        </div>
      </div>
    </div>

  </div><!-- /panels -->

  <div class="page-foot">
    AUTO-REFRESH IN <span id="countdown">300</span>s
  </div>

</div><!-- /page -->

<script>
(function () {
'use strict';

const DAYS      = ['Mon', 'Tue', 'Wed', 'Thu', 'Fri'];
const WEEK_GOAL = 10;
const POLL_SEC  = 300; // 5 minutes

let countdown = POLL_SEC;
let pollTimer  = null;
let syncing    = false; // prevent stacked concurrent fetches

// ── Helpers ──────────────────────────────────────────────────────

function $(id) { return document.getElementById(id); }
function setText(id, v) { const el = $(id); if (el) el.textContent = String(v); }
function pct(n, d) { return d > 0 ? Math.round((n / d) * 100) : 0; }

function monthName() {
  return new Date().toLocaleString('en-US', { month: 'long', year: 'numeric' });
}

function weekRange() {
  const now = new Date();
  const dow = now.getDay();
  const mon = new Date(now);
  mon.setDate(now.getDate() - (dow === 0 ? 6 : dow - 1));
  const fri = new Date(mon);
  fri.setDate(mon.getDate() + 4);
  const fmt = (d) => d.toLocaleString('en-US', { month: 'short', day: 'numeric' });
  return `Week of ${fmt(mon)} – ${fmt(fri)}`;
}

function showError(msg, detail) {
  $('errBanner').classList.add('show');
  setText('errMsg',    msg);
  setText('errDetail', detail || '');
}
function hideError() { $('errBanner').classList.remove('show'); }

function setLoading(on) {
  $('refreshBtn').disabled = on;
  if (on) $('syncInfo').textContent = 'Loading…';
}

// ── Bar chart ────────────────────────────────────────────────────

function renderChart(byDay) {
  const CHART_H = 108; // px, must match CSS .bar-pair height
  let maxVal = 1;
  for (const day of DAYS) {
    maxVal = Math.max(maxVal, byDay.Anish[day] || 0, byDay.Michelle[day] || 0);
  }

  $('barChart').innerHTML = DAYS.map(day => {
    const a  = byDay.Anish[day]    || 0;
    const m  = byDay.Michelle[day] || 0;
    const aH = Math.max(2, Math.round((a / maxVal) * CHART_H));
    const mH = Math.max(2, Math.round((m / maxVal) * CHART_H));
    const aNum = a > 0 ? `<span class="bar-num">${a}</span>` : '';
    const mNum = m > 0 ? `<span class="bar-num">${m}</span>` : '';
    return `
      <div class="day-col">
        <div class="bar-pair">
          <div class="bar-wrap">${aNum}<div class="bar bar-a" style="height:${aH}px"></div></div>
          <div class="bar-wrap">${mNum}<div class="bar bar-m" style="height:${mH}px"></div></div>
        </div>
        <span class="day-lbl">${day}</span>
      </div>`;
  }).join('');
}

// ── Render monthly data ──────────────────────────────────────────

function renderMonthly(d) {
  setText('monthLabel', monthName());
  setText('mtdAppts', d.appts);
  setText('mtdApptA', d.apptAnish);
  setText('mtdApptM', d.apptMichelle);
  setText('mtdMQL', d.mqls);
  setText('mtdSQL', d.sqls);

  const mqlPct = pct(d.mqls, d.appts);
  const sqlPct = pct(d.sqls, d.appts);
  $('mqlBar').style.width  = Math.min(100, mqlPct) + '%';
  $('sqlBar').style.width  = Math.min(100, sqlPct) + '%';
  setText('mqlRate', mqlPct + '%');
  setText('sqlRate', sqlPct + '%');
}

// ── Render weekly data ───────────────────────────────────────────

function renderWeekly(d) {
  setText('weekLabel', weekRange());
  renderChart(d.byDay);

  const wm = d.weekMeetings;
  setText('wkMeetings', wm);
  $('meetingsBar').style.width = Math.min(100, pct(wm, WEEK_GOAL)) + '%';
  setText('wkMtgA', d.anish.meetings);
  setText('wkMtgM', d.michelle.meetings);

  setText('avgA', d.anish.avgDials);
  setText('avgM', d.michelle.avgDials);
  setText('connA', d.anish.connects);
  setText('connM', d.michelle.connects);
}

// ── Fetch ────────────────────────────────────────────────────────

async function fetchJSON(url) {
  const r = await fetch(url);
  const j = await r.json();
  if (!r.ok) throw new Error(j.error || `HTTP ${r.status}`);
  return j;
}

async function loadAll() {
  if (syncing) return;
  syncing = true;
  hideError();
  setLoading(true);

  try {
    const data = await fetchJSON('/api/hubspot?type=all');
    renderMonthly(data.monthly);
    renderWeekly(data.weekly);
    $('syncInfo').textContent = 'Synced ' + new Date().toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
    countdown = POLL_SEC;
  } catch (e) {
    let detail = '';
    if (e.message && e.message.includes('HUBSPOT_TOKEN')) {
      detail = 'Set HUBSPOT_TOKEN in your Vercel environment variables. Create a Private App in HubSpot → Settings → Integrations → Private Apps with scopes: crm.objects.deals.read and crm.objects.calls.read.';
    } else if (e.message && e.message.includes('fetch')) {
      detail = 'Could not reach /api/hubspot. Open this page via Vercel (not as a local file).';
    } else {
      detail = e.message || String(e);
    }
    showError('HubSpot sync failed', detail);
    $('syncInfo').textContent = 'Failed ' + new Date().toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
  }

  setLoading(false);
  syncing = false;
}

// ── Countdown + auto-poll ────────────────────────────────────────

function tick() {
  countdown--;
  setText('countdown', Math.max(0, countdown));
  if (countdown <= 0) { countdown = POLL_SEC; loadAll(); }
}

// ── Init ─────────────────────────────────────────────────────────

setText('monthLabel', monthName());
setText('weekLabel',  weekRange());

// Render empty chart placeholder
renderChart({ Anish: {Mon:0,Tue:0,Wed:0,Thu:0,Fri:0}, Michelle: {Mon:0,Tue:0,Wed:0,Thu:0,Fri:0} });

loadAll();
setInterval(tick, 1000);

})();
